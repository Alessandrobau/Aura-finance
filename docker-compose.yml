services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      POSTGRES_DB: finance_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://finance:finance@postgres:5432/finance_app
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: "7d"
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BRAPI_TOKEN: ${BRAPI_TOKEN:-}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://192.168.0.81:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://192.168.0.81:3000
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
